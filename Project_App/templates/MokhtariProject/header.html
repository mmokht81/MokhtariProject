{% load static %}

<header id="header" class="header">

  <div class="header-content">

    <!-- Logo -->
    <a href="{% url 'aboutPage' %}" class="link-pic-logo" aria-label="درباره ما">
      <img
        class="pic-logo"
        src="{% static 'webP/logo/logo.png' %}"
        alt="لوگوی سایت">
    </a>

    <!-- Menu Button -->
    <button
      class="menu-btn"
      id="menuBtn"
      aria-label="باز کردن منو"
      aria-expanded="false"
      aria-controls="sideMenu"
      title="منو">

      <svg width="40"
           height="30"
           viewBox="0 0 40 30"
           xmlns="http://www.w3.org/2000/svg">

        <g id="burgerLines">

          <g class="line line-1">
            <rect x="10" y="6" width="22" height="3" rx="3"></rect>
          </g>

          <g class="line line-2">
            <rect x="12" y="13" width="10" height="3" rx="2"></rect>
          </g>

          <g class="line line-3">
            <rect x="10" y="20" width="22" height="3" rx="3"></rect>
          </g>

        </g>

      </svg>

    </button>

    <!-- Brand -->
    <div class="header-bottom-text">
      <img
        class="logo-text"
        src="{% static 'webP/logo/name.png' %}"
        alt="مختاری">
    </div>

  </div>

  <nav class="menu" id="sideMenu">

    <div class="menu-content">

      <!-- Links -->
      <ul class="menu-list">

        <li class="menu-item">
          <a href="{% url 'homePage' %}">
            صفحه اصلی
          </a>
        </li>

        <li class="menu-item">
          <a href="{% url 'projectsPage' %}">
            پروژه ها
          </a>
        </li>

        <li class="menu-item">
          <a href="{% url 'aboutPage' %}">
            درباره ما
          </a>
        </li>

        <li class="menu-item">
          <a href="{% url 'contactPage' %}">
            ارتباط با ما
          </a>
        </li>

      </ul>

      <!-- Big Logo -->
      <div class="menu-logo">

        <img
          src="{% static 'webP/logo/logo.png' %}"
          alt="لوگوی مختاری">

      </div>

    </div>

  </nav>

</header>

<div id="overlay"></div>
