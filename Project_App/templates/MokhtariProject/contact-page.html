{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ارتباط با ما</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="{% static 'webP/logo/logo+back.png' %}">
  <link rel="stylesheet" href="{% static 'contact-about.css' %}">
  <link rel="stylesheet" href="{% static 'gallery.css' %}">
  <link rel="stylesheet" href="{% static 'galleryHoriz.css'%}">
  <link rel="stylesheet" href="{% static 'header.css' %}">

</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="contact-container gallery-section">
    <div class="blur-ball one"></div>
    <div class="blur-ball two"></div>
      <div class="hero-grid-pattern"></div>
      <div class="hero-noise"></div>
      <div class="hero-glow hero-glow-1"></div>
      <div class="hero-glow hero-glow-2"></div>
      <div class="contact-hero">
        <div class="text">
            <span class="hero-tag">
                Contact with us
            </span>
            <div class="hero-number">03</div>
            <h1 class="hero-title">
                ارتباط با ما
            </h1>
            <p class="hero-description">
              برای هماهنگی، مشاوره یا اطلاعات بیشتر از طریق راه‌های زیر با ما در ارتباط باشید.
            </p>
      </div>
      <div class="hero-scroll">
          <span></span>
      </div>
      </div>

      <div class="contact-card">
        <div class="d-flex flex-column gap-2">
          <div class="contact-item d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
              <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="black" viewBox="0 0 24 24"><path d="M6.62 10.79a15.091 15.091 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.24 1.02l-2.21 2.2z"/></svg>
              <a href="tel:+989123456789"> +989390899268 </a>
            </div>
          </div>

          <div class="contact-item d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
              <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="black" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.89 2 1.99 2H20c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <a href="mailto:info@example.com">info@example.com</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="{% static 'galleryHoriz.js' %}"></script>
  <script> const headerUrl = "{% url 'header' %}"; </script>
  <script src="{% static 'script/header.js' %}" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
