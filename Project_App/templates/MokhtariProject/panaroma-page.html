{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گردش در خانه</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="{% static 'webP/logo/logo+back.png' %}">
  <link rel="stylesheet" href="{% static 'header.css' %}">

  <style>
    body {
      margin: 0;
      background: #00406a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container-custom {
      position: relative;
      width: 360px;
      height: 800px;
      padding: 7px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      background: #003559;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .scroll-area {
      flex: 1;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-behavior: smooth;
      border-radius: 12px;
      cursor: grab;
      position: relative;
    }

    .scroll-area:active {
      cursor: grabbing;
    }

    .scroll-area img {
      height: 100%;
      width: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: #ffffff4d;
      padding: 10px 20px;
      border-radius: 50px;
    }

    .btn-control {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #ccc;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
    }

    .btn-control:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(0, 150, 255, 0.4);
      background: rgba(255, 255, 255, 0.95);
    }

    .btn-control:active {
      background: rgba(240, 240, 240, 0.9);
      transform: scale(1.06);
    }

    @media (min-width: 768px) {
      body {
        justify-content: center;
        align-items: center;
      }
    }

    @media (min-width: 1200px) {
      body {
        justify-content: center;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <div class="container-custom d-flex flex-column align-items-center justify-content-center">
    <div class="scroll-area w-100" id="scrollArea">
  <img src="{% static 'webP\house-walking\house-walking.webp' %}" alt="نمای داخل خانه" class="img-fluid">
    </div>

    <div class="controls d-flex justify-content-center align-items-center">
      <div class="btn-control" id="leftBtn">➡</div>
      <div class="btn-control text-dark text-decoration-none" id="backBtn">x</div>
      <div class="btn-control" id="rightBtn">⬅</div>
    </div>
  </div>

  <script>
    const scrollArea = document.getElementById("scrollArea");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const step = 90;

    leftBtn.addEventListener("click", () => {
      scrollArea.scrollBy({ left: -step, behavior: "smooth" });
    });

    rightBtn.addEventListener("click", () => {
      scrollArea.scrollBy({ left: step, behavior: "smooth" });
    });

    let isDown = false;
    let startX;
    let scrollLeft;

    scrollArea.addEventListener("mousedown", (e) => {
      isDown = true;
      startX = e.pageX - scrollArea.offsetLeft;
      scrollLeft = scrollArea.scrollLeft;
    });

    scrollArea.addEventListener("mouseleave", () => {
      isDown = false;
    });

    scrollArea.addEventListener("mouseup", () => {
      isDown = false;
    });

    scrollArea.addEventListener("mousemove", (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - scrollArea.offsetLeft;
      const walk = (x - startX) * 1.5;
      scrollArea.scrollLeft = scrollLeft - walk;
    });

    let touchStartX = 0;
    let touchScrollLeft = 0;

    scrollArea.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].pageX;
      touchScrollLeft = scrollArea.scrollLeft;
    });

    scrollArea.addEventListener("touchmove", (e) => {
      const x = e.touches[0].pageX;
      const walk = (x - touchStartX) * 1.5;
      scrollArea.scrollLeft = touchScrollLeft - walk;
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "/";
     }
    });

  </script>
  <script> const headerUrl = "{% url 'header' %}"; </script>
  <script src="{% static 'script/header.js' %}" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
