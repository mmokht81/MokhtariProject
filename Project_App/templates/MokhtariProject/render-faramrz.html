{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رندرهای پروژه</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    {% comment %} لوگو با بکگراند بزارررررررررررررررررررررر {% endcomment %}
    <link rel="icon" type="image/png" href="{% static 'webP/logo/logo+back.png' %}">

    <link rel="stylesheet" href="{% static 'gallery.css' %}">
    <link rel="stylesheet" href="{% static 'galleryHoriz.css' %}">
    <link rel="stylesheet" href="{% static 'gallery-lightbox.css' %}">
    <link rel="stylesheet" href="{% static 'contact-about.css' %}">
    <link rel="stylesheet" href="{% static 'header.css' %}">
</head>

<body>
    <div id="header-placeholder"></div>

    <section class="gallery-section container-fluid">
    <div class="blur-ball one"></div>
    <div class="blur-ball two"></div>
    <div class="contact-hero">
        <div class="hero-grid-pattern"></div>
        <div class="hero-noise"></div>
        <div class="hero-glow hero-glow-1"></div>
        <div class="hero-glow hero-glow-2"></div>
        <div class="text">
            <span class="hero-tag">
                Project Renders
            </span>
            <div class="hero-number">01</div>
            <h1 class="hero-title">
                نمایش بصری پروژه
            </h1>
            <p class="hero-description">
                روایت بصری پروژه، پیش از آنکه ساخته شود.
                <br>
                رندرهایی که جزئیات، نور و هویت طراحی را به تصویر می‌کشند.
            </p>
        </div>
        <div class="hero-scroll">
            <span></span>
        </div>
    </div>

    <div class="strip-wrapper">
        <div class="strip-header">
            <div class="strip-left">
                <span class="strip-number">01</span>
                <div class="strip-info">
                    <h3>
                        رندرهای پروژه
                    </h3>
                    <p>
                        طراحی سه‌بعدی و نمایش نهایی
                    </p>
                </div>
            </div>
            <div class="strip-line">
                <span></span>
            </div>
        </div>

        <div class="strip-progress">
            <div class="strip-progress-bar"></div>
        </div>

        <div class="gallery-container">
            <div class="gallery-arrow left" onclick="scrollStrip('strip-renders',-1)">
                ›
            </div>
            <div class="gallery-strip" id="strip-renders">
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/359_5_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/12585668_9_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/41255_8_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/2_041530_1_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/2 (2)_15_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/1 (2)_10_11zon.webp' %}" alt="">
                </div>
                <div class="gallery-frame">
                    <img src="{% static 'webP/inside/1_051308_14_11zon.webp' %}" alt="">
                </div>
            </div>
            <div class="gallery-arrow right" onclick="scrollStrip('strip-renders',1)">
                ‹
            </div>
        </div>
    </div>
</section>

    <script>
    function scrollStrip(stripId, direction){
        const strip=document.getElementById(stripId);
        if(!strip) return;
        strip.scrollBy({
            left:direction*260,
            behavior:"smooth"
        });
    }
    </script>

    <script src="{% static 'script/galleryHoriz.js' %}"></script>

    <script src="{% static 'script/gallery-lightbox.js' %}"></script>

    <script>const headerUrl="{% url 'header' %}";</script>
    <script src="{% static 'script/header.js' %}" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
