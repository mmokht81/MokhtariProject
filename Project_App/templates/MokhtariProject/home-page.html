{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مختاری - طراحی و اجرای دکوراسیون داخلی با بالاترین کیفیت و خلاقیت در طراحی">
  <meta name="keywords" content="دکوراسیون داخلی, طراحی داخلی, معماری داخلی, دکوراسیون منزل, طراحی مدرن">
  <meta name="author" content="Mokhtari Interior Design">
  <meta name="robots" content="index, follow">
  <meta name="language" content="fa">
  <title>مختاری</title>
  
  <meta property="og:title" content="مختاری - متخصص طراحی و اجرای دکوراسیون داخلی">
  <meta property="og:description" content="ارائه خدمات برتر در زمینه طراحی و اجرای دکوراسیون داخلی">
  <meta property="og:image" content="{% static 'webP/logo/logo.webp' %}">
  <meta property="og:url" content="https://MokhtariProject.com">
  
  <link rel="icon" type="image/png" href="{% static 'webP/logo/logo+back.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link rel="stylesheet" href="{% static 'header.css' %}">

</head>
<body>

  <div id="header-placeholder"></div>

  <main class="slide-sh-pics position-relative w-100 h-100">
    <div class="fade-section position-absolute top-0 start-0 w-100 h-100">
      <img src="{% static 'webP/inside/457_6_11zon.webp' %}" class="w-100 h-100" alt="طراحی مدرن دکوراسیون داخلی منزل - مختاری دیزاین" loading="lazy">
    </div>
    <div class="fade-section position-absolute top-0 start-0 w-100 h-100">
      <img src="{% static 'webP/inside/23532_7_11zon.webp' %}" class="w-100 h-100" alt="دکوراسیون داخلی لوکس و مدرن - مختاری دیزاین" loading="lazy">
    </div>
    <div class="fade-section position-absolute top-0 start-0 w-100 h-100">
      <img src="{% static 'webP/inside/41255_8_11zon.webp' %}" class="w-100 h-100" alt="طراحی داخلی منحصر به فرد - مختاری دیزاین" loading="lazy">
    </div>
    <div class="fade-section position-absolute top-0 start-0 w-100 h-100">
      <img src="{% static 'webP/inside/359_5_11zon.webp' %}" class="w-100 h-100" alt="عکس 4">
    </div>
    <div class="fade-section position-absolute top-0 start-0 w-100 h-100">
      <img src="{% static 'webP/inside/2_041530_1_11zon.webp' %}" class="w-100 h-100" alt="عکس 5">
    </div>
  </main>

  <script>
        const slides = document.querySelectorAll('.slide-sh-pics img');
let current = 0;

function showSlide(index) {
  slides.forEach((slide, i) => {
    slide.classList.toggle('active', i === index);
  });
}

function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

showSlide(current);
setInterval(nextSlide, 4000);

  </script>
    <script src="{% static 'script/header.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
